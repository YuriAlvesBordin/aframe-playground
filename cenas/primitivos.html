<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Demo 01 &mdash; Primitivos 3D</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #back {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px;
      border-radius: 8px; text-decoration: none; font-family: system-ui; font-size: 0.85rem;
    }
    #back:hover { background: rgba(255,255,255,0.15); }
    #label {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #8be9fd; padding: 8px 20px;
      border-radius: 8px; font-family: system-ui; font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <a href="../index.html" id="back">&#8592; Voltar</a>
  <div id="label">Demo 01 &mdash; Primitivos 3D &nbsp;|&nbsp; Arraste para girar</div>

  <a-scene background="color: #0d1117">

    <a-light type="ambient" color="#fff" intensity="0.5"></a-light>
    <a-light type="directional" color="#fff" intensity="1" position="2 4 2"></a-light>

    <a-box position="-4 1 -5" color="#64ffda"
           animation="property:rotation; to:0 360 0; loop:true; dur:4000; easing:linear">
    </a-box>
    <a-text value="a-box" position="-4 -0.2 -5" align="center" color="#aaa" width="4"></a-text>

    <a-sphere position="-1.5 1 -5" radius="0.7" color="#bd93f9"
              animation="property:position; from:-1.5 0.5 -5; to:-1.5 1.8 -5; dir:alternate; loop:true; dur:1800; easing:easeInOutSine">
    </a-sphere>
    <a-text value="a-sphere" position="-1.5 -0.2 -5" align="center" color="#aaa" width="4"></a-text>

    <a-cylinder position="0.8 1 -5" radius="0.5" height="1.5" color="#ff79c6"
                animation="property:rotation; to:0 360 0; loop:true; dur:3000; easing:linear">
    </a-cylinder>
    <a-text value="a-cylinder" position="0.8 -0.2 -5" align="center" color="#aaa" width="4"></a-text>

    <a-cone position="2.8 1 -5" color="#8be9fd" radius-bottom="0.6" height="1.5"
            animation="property:rotation; to:0 -360 0; loop:true; dur:5000; easing:linear">
    </a-cone>
    <a-text value="a-cone" position="2.8 -0.2 -5" align="center" color="#aaa" width="4"></a-text>

    <a-torus position="-1 1 -8" radius="1" radius-tubular="0.15" color="#ffb86c"
             animation="property:rotation; to:360 360 0; loop:true; dur:7000; easing:linear">
    </a-torus>
    <a-text value="a-torus" position="-1 -0.5 -8" align="center" color="#aaa" width="5"></a-text>

    <a-plane position="2.5 1 -8" rotation="0 -20 30" width="1.5" height="1.5" color="#50fa7b" side="double"
             animation="property:rotation; from:0 -20 30; to:360 -20 30; loop:true; dur:6000; easing:linear">
    </a-plane>
    <a-text value="a-plane" position="2.5 -0.5 -8" align="center" color="#aaa" width="5"></a-text>

    <a-plane rotation="-90 0 0" width="20" height="20" color="#161b22" position="0 0 -5"></a-plane>

    <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>

  </a-scene>
</body>
</html>
