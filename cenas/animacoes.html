<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Demo 03 — Importar Modelo 3D</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    #back {
      position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px;
      border-radius: 8px; text-decoration: none; font-family: system-ui; font-size: 0.85rem;
      pointer-events: auto;
    }
    #back:hover { background: rgba(255,255,255,0.15); }

    #ui {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 9999; pointer-events: auto;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
    }

    #drop-zone {
      width: 320px;
      border: 2px dashed #333;
      border-radius: 10px;
      padding: 40px 32px;
      text-align: center;
      background: rgba(10,10,10,0.85);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-family: 'IBM Plex Mono', monospace;
    }

    #drop-zone.dragover {
      border-color: #00c853;
      background: rgba(0,200,83,0.07);
    }

    #drop-zone p {
      font-size: 0.78rem;
      color: #555;
      margin-top: 10px;
      line-height: 1.6;
    }

    #drop-zone strong {
      font-size: 0.9rem;
      color: #f0f0f0;
      display: block;
      margin-bottom: 4px;
    }

    .icon {
      width: 40px; height: 40px; margin: 0 auto 12px;
      opacity: 0.4;
    }

    #file-input { display: none; }

    #btn-pick {
      background: #00c853; color: #000;
      border: none; padding: 10px 28px;
      border-radius: 6px; font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem; cursor: pointer; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      transition: background 0.15s;
    }
    #btn-pick:hover { background: #00e676; }

    #status {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #555; padding: 8px 20px;
      border-radius: 6px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
      pointer-events: none; border: 1px solid #222; z-index: 9999;
      transition: color 0.3s;
    }

    #controls {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      display: none; flex-direction: column; gap: 8px; pointer-events: auto;
    }

    .ctrl-btn {
      background: rgba(0,0,0,0.7); color: #f0f0f0;
      border: 1px solid #333; padding: 7px 14px;
      border-radius: 6px; font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem; cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s;
    }
    .ctrl-btn:hover { border-color: #00c853; background: rgba(0,200,83,0.08); color: #00c853; }

    a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <a href="../index.html" id="back">&#8592; Voltar</a>

  <div id="ui">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <strong>Arraste um modelo 3D aqui</strong>
      <p>Formatos suportados:<br>.glb &nbsp;/&nbsp; .gltf &nbsp;/&nbsp; .obj</p>
    </div>
    <button id="btn-pick" onclick="document.getElementById('file-input').click()">Selecionar arquivo</button>
    <input type="file" id="file-input" accept=".glb,.gltf,.obj">
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="btn-rotate">Rotacao: ON</button>
    <button class="ctrl-btn" id="btn-remove">Remover modelo</button>
  </div>

  <div id="status">Aguardando modelo...</div>

  <a-scene background="color: #0a0a0a">
    <a-assets id="assets"></a-assets>

    <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.2" position="3 6 4"></a-light>
    <a-light type="point" color="#4488ff" intensity="1" position="-4 3 -2" distance="15" decay="2"></a-light>

    <a-entity id="model-container" position="0 1.4 -4"></a-entity>

    <a-plane rotation="-90 0 0" width="20" height="20" position="0 0 -4"
      material="color:#111; roughness:0.9; metalness:0">
    </a-plane>

    <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>
  </a-scene>

  <script>
    const ui        = document.getElementById('ui');
    const controls  = document.getElementById('controls');
    const status    = document.getElementById('status');
    const container = document.getElementById('model-container');
    const dropZone  = document.getElementById('drop-zone');
    const btnRotate = document.getElementById('btn-rotate');
    const btnRemove = document.getElementById('btn-remove');

    let rotating = true;
    let objectURL = null;

    function setStatus(msg, color) {
      status.textContent = msg;
      status.style.color = color || '#555';
    }

    function clearModel() {
      while (container.firstChild) container.removeChild(container.firstChild);
      if (objectURL) { URL.revokeObjectURL(objectURL); objectURL = null; }
    }

    function loadFile(file) {
      if (!file) return;

      const ext = file.name.split('.').pop().toLowerCase();
      if (!['glb', 'gltf', 'obj'].includes(ext)) {
        setStatus('Formato nao suportado. Use .glb, .gltf ou .obj', '#ff2200');
        return;
      }

      clearModel();
      setStatus('Carregando ' + file.name + '...', '#ffd600');

      objectURL = URL.createObjectURL(file);
      const el = document.createElement('a-entity');

      if (ext === 'obj') {
        el.setAttribute('obj-model', 'obj: ' + objectURL);
      } else {
        el.setAttribute('gltf-model', objectURL);
      }

      el.setAttribute('scale', '1 1 1');
      el.setAttribute('rotation', '0 0 0');

      if (rotating) {
        el.setAttribute('animation', 'property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:8000; easing:linear');
      }

      el.addEventListener('model-loaded', () => {
        const mesh = el.getObject3D('mesh');
        if (mesh) {
          const box = new THREE.Box3().setFromObject(mesh);
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          if (maxDim > 0) {
            const s = 2 / maxDim;
            el.setAttribute('scale', s + ' ' + s + ' ' + s);
          }
          const center = box.getCenter(new THREE.Vector3());
          el.setAttribute('position', (-center.x) + ' ' + (-center.y) + ' ' + (-center.z));
        }
        setStatus(file.name + '  |  Arraste para girar a camera', '#00c853');
        ui.style.display = 'none';
        controls.style.display = 'flex';
      });

      el.addEventListener('model-error', () => {
        setStatus('Erro ao carregar o modelo.', '#ff2200');
      });

      container.appendChild(el);
    }

    document.getElementById('file-input').addEventListener('change', e => {
      loadFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      loadFile(e.dataTransfer.files[0]);
    });

    btnRotate.addEventListener('click', () => {
      rotating = !rotating;
      btnRotate.textContent = 'Rotacao: ' + (rotating ? 'ON' : 'OFF');
      const el = container.firstChild;
      if (!el) return;
      if (rotating) {
        el.setAttribute('animation', 'property:rotation; from:0 0 0; to:0 360 0; loop:true; dur:8000; easing:linear');
      } else {
        el.removeAttribute('animation');
      }
    });

    btnRemove.addEventListener('click', () => {
      clearModel();
      ui.style.display = 'flex';
      controls.style.display = 'none';
      setStatus('Aguardando modelo...');
      document.getElementById('file-input').value = '';
    });
  </script>
</body>
</html>
