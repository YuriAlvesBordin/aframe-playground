<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Demo 01 — Primitivos 3D</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #back {
      position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(0,0,0,0.6); color: #fff; padding: 8px 16px;
      border-radius: 8px; text-decoration: none; font-family: system-ui; font-size: 0.85rem;
      pointer-events: auto;
    }
    #back:hover { background: rgba(255,255,255,0.15); }
    #info {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #f0f0f0; padding: 10px 24px;
      border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
      pointer-events: none; text-align: center; white-space: nowrap;
      border: 1px solid #333;
    }
    #info span { color: #00c853; }
    #btn-ar {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      background: rgba(0,200,83,0.15); color: #00c853;
      border: 1px solid #00c853; padding: 8px 16px;
      border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
      cursor: pointer; pointer-events: auto; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    #btn-ar:hover { background: rgba(0,200,83,0.3); }
    a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <a href="../index.html" id="back">&#8592; Voltar</a>
  <a href="demo4.html" id="btn-ar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M2 8V5a2 2 0 0 1 2-2h3"/><path d="M17 3h3a2 2 0 0 1 2 2v3"/>
      <path d="M22 16v3a2 2 0 0 1-2 2h-3"/><path d="M7 21H4a2 2 0 0 1-2-2v-3"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    Modo AR
  </a>
  <div id="info">Primitivo atual: <span id="prim-name">a-box</span> &nbsp;|&nbsp; Arraste para girar</div>

  <a-scene background="color: #0a0a0a">
    <a-light type="ambient" color="#ffffff" intensity="0.4"></a-light>
    <a-light type="point" color="#ffffff" intensity="2" position="3 5 3" distance="20" decay="1"></a-light>
    <a-light type="point" color="#4488ff" intensity="1" position="-4 2 -2" distance="15" decay="2"></a-light>

    <a-entity id="shape" position="0 1.4 -4"></a-entity>

    <a-camera position="0 1.6 0" look-controls wasd-controls></a-camera>
  </a-scene>

  <script>
    const PRIMITIVES = [
      { tag: 'a-box',          attrs: {} },
      { tag: 'a-sphere',       attrs: { radius: '0.9' } },
      { tag: 'a-cylinder',     attrs: { radius: '0.7', height: '1.4' } },
      { tag: 'a-cone',         attrs: { 'radius-bottom': '0.8', height: '1.6' } },
      { tag: 'a-torus',        attrs: { radius: '0.8', 'radius-tubular': '0.18' } },
      { tag: 'a-torus-knot',   attrs: { radius: '0.7', 'radius-tubular': '0.08' } },
      { tag: 'a-icosahedron',  attrs: { radius: '0.9' } },
      { tag: 'a-dodecahedron', attrs: { radius: '0.9' } },
      { tag: 'a-octahedron',   attrs: { radius: '0.9' } },
      { tag: 'a-tetrahedron',  attrs: { radius: '0.9' } },
    ];

    const COLORS = [
      '#00c853', '#ffd600', '#2979ff', '#ff1a1a',
      '#00e5ff', '#ff6d00', '#d500f9', '#76ff03',
      '#f50057', '#ffffff',
    ];

    let current = null;
    let index = 0;
    const container = document.getElementById('shape');
    const nameEl = document.getElementById('prim-name');
    const INTERVAL = 2800;
    const FADE_MS = 600;

    function randColor() {
      return COLORS[Math.floor(Math.random() * COLORS.length)];
    }

    function randFloat(min, max) {
      return (Math.random() * (max - min) + min).toFixed(2);
    }

    function buildMaterial() {
      const metalness = randFloat(0, 1);
      const roughness = randFloat(0, 1);
      const opacity   = randFloat(0.35, 1);
      const color     = randColor();
      const emissive  = Math.random() > 0.6 ? randColor() : '#000000';
      const wireframe = Math.random() > 0.85 ? 'true' : 'false';
      const transparent = opacity < 0.99 ? 'true' : 'false';
      return `color:${color}; roughness:${roughness}; metalness:${metalness}; opacity:${opacity}; transparent:${transparent}; emissive:${emissive}; emissiveIntensity:0.4; wireframe:${wireframe}`;
    }

    function spawnNext() {
      const def = PRIMITIVES[index % PRIMITIVES.length];
      index++;

      const el = document.createElement(def.tag);

      for (const [k, v] of Object.entries(def.attrs)) {
        el.setAttribute(k, v);
      }

      el.setAttribute('material', buildMaterial());
      el.setAttribute('scale', '0.001 0.001 0.001');
      el.setAttribute('rotation', `${Math.random()*360} ${Math.random()*360} ${Math.random()*360}`);
      el.setAttribute('animation__rot', 'property:rotation; to:' + `${Math.random()*720} ${360+Math.random()*360} ${Math.random()*360}` + '; dur:' + (INTERVAL * 4) + '; easing:linear; loop:true');
      el.setAttribute('animation__scale_in', 'property:scale; from:0.001 0.001 0.001; to:1 1 1; dur:' + FADE_MS + '; easing:easeOutCubic');

      container.appendChild(el);
      nameEl.textContent = def.tag;

      if (current) {
        const dying = current;
        dying.setAttribute('animation__scale_out', 'property:scale; to:0.001 0.001 0.001; dur:' + FADE_MS + '; easing:easeInCubic');
        setTimeout(() => { if (dying.parentNode) dying.parentNode.removeChild(dying); }, FADE_MS + 50);
      }

      current = el;
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      spawnNext();
      setInterval(spawnNext, INTERVAL);
    });
  </script>
</body>
</html>
