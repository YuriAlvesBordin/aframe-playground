<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Demo 03 — Importar Modelo 3D</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; font-family: 'IBM Plex Mono', monospace; overflow: hidden; }

    #back {
      position: fixed; top: 16px; left: 16px; z-index: 9999;
      background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px;
      border-radius: 8px; text-decoration: none; font-family: system-ui; font-size: 0.85rem;
      pointer-events: auto;
    }
    #back:hover { background: rgba(255,255,255,0.15); }

    #btn-ar {
      position: fixed; top: 16px; right: 16px; z-index: 9999;
      background: rgba(41,121,255,0.12); color: #2979ff;
      border: 1px solid #2979ff; padding: 8px 16px;
      border-radius: 8px; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
      cursor: pointer; pointer-events: auto; text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    #btn-ar:hover { background: rgba(41,121,255,0.28); }

    #drop-screen {
      position: fixed; inset: 0; z-index: 8000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      background: #0a0a0a;
    }
    #drop-zone {
      width: 340px; border: 2px dashed #2a2a2a; border-radius: 12px;
      padding: 48px 32px; text-align: center;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      background: #111;
    }
    #drop-zone.over { border-color: #00c853; background: rgba(0,200,83,0.05); }
    #drop-zone svg { margin: 0 auto 16px; display: block; opacity: 0.35; }
    #drop-zone strong { display: block; font-size: 0.9rem; color: #f0f0f0; margin-bottom: 6px; font-family: 'IBM Plex Sans', sans-serif; }
    #drop-zone p { font-size: 0.72rem; color: #555; line-height: 1.7; }
    #btn-pick {
      background: #00c853; color: #000; border: none;
      padding: 11px 32px; border-radius: 6px;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s;
    }
    #btn-pick:hover { background: #00e676; }
    #file-input { display: none; }

    #hud {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 9999; display: none; align-items: center; gap: 12px;
      background: rgba(0,0,0,0.75); border: 1px solid #222;
      border-radius: 8px; padding: 10px 20px; pointer-events: auto;
    }
    #hud strong { font-size: 0.7rem; color: #00c853; white-space: nowrap; }
    .hud-sep { color: #2a2a2a; font-size: 0.7rem; }
    #hud-hint { font-size: 0.65rem; color: #444; white-space: nowrap; }
    #btn-remove {
      background: none; border: 1px solid #333; color: #aaa;
      padding: 5px 12px; border-radius: 5px;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
      cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }
    #btn-remove:hover { border-color: #ff2200; color: #ff2200; }

    a-scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <a href="../index.html" id="back">&#8592; Voltar</a>
  <a href="demo4.html" id="btn-ar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M2 8V5a2 2 0 0 1 2-2h3"/><path d="M17 3h3a2 2 0 0 1 2 2v3"/>
      <path d="M22 16v3a2 2 0 0 1-2 2h-3"/><path d="M7 21H4a2 2 0 0 1-2-2v-3"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    Modo AR
  </a>

  <div id="drop-screen">
    <div id="drop-zone">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <strong>Arraste um modelo 3D aqui</strong>
      <p>.glb &nbsp;&bull;&nbsp; .gltf &nbsp;&bull;&nbsp; .obj</p>
    </div>
    <button id="btn-pick">Selecionar arquivo</button>
    <input type="file" id="file-input" accept=".glb,.gltf,.obj">
  </div>

  <div id="hud">
    <strong id="hud-name"></strong>
    <span class="hud-sep">|</span>
    <span id="hud-hint">Arraste: orbitar &nbsp; Scroll: zoom &nbsp; Botao direito: pan</span>
    <span class="hud-sep">|</span>
    <button id="btn-remove">Remover</button>
  </div>

  <a-scene id="scene" background="color: #0a0a0a" renderer="antialias:true" vr-mode-ui="enabled:false">
    <a-light type="ambient"     color="#ffffff" intensity="0.6"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.5" position="5 10 7"></a-light>
    <a-light type="directional" color="#8899ff" intensity="0.4" position="-5 2 -3"></a-light>

    <a-entity id="model-wrapper" position="0 0 0"></a-entity>

    <a-camera id="cam" position="0 0 6"
      look-controls="enabled:false"
      wasd-controls="enabled:false">
    </a-camera>
  </a-scene>

  <script>
    const dropScreen = document.getElementById('drop-screen');
    const dropZone   = document.getElementById('drop-zone');
    const fileInput  = document.getElementById('file-input');
    const btnPick    = document.getElementById('btn-pick');
    const hud        = document.getElementById('hud');
    const hudName    = document.getElementById('hud-name');
    const btnRemove  = document.getElementById('btn-remove');
    const wrapper    = document.getElementById('model-wrapper');

    let blobURL = null;
    let modelEl = null;

    const orbit = {
      theta: 0, phi: 75, radius: 6,
      panX: 0, panY: 0,
      dragging: false, panning: false,
      lastX: 0, lastY: 0,
    };

    const DEG = Math.PI / 180;

    function updateCamera() {
      const camEl = document.getElementById('cam');
      const r = orbit.radius;
      const phi   = orbit.phi   * DEG;
      const theta = orbit.theta * DEG;
      const x = r * Math.sin(phi) * Math.sin(theta) + orbit.panX;
      const y = r * Math.cos(phi)                   + orbit.panY;
      const z = r * Math.sin(phi) * Math.cos(theta);
      camEl.setAttribute('position', x + ' ' + y + ' ' + z);
      const target = new THREE.Vector3(orbit.panX, orbit.panY, 0);
      const pos    = new THREE.Vector3(x, y, z);
      const mat    = new THREE.Matrix4().lookAt(pos, target, new THREE.Vector3(0, 1, 0));
      const quat   = new THREE.Quaternion().setFromRotationMatrix(mat);
      const euler  = new THREE.Euler().setFromQuaternion(quat, 'YXZ');
      camEl.setAttribute('rotation', {
        x: THREE.MathUtils.radToDeg(euler.x),
        y: THREE.MathUtils.radToDeg(euler.y),
        z: THREE.MathUtils.radToDeg(euler.z),
      });
    }

    const sceneEl = document.querySelector('a-scene');

    sceneEl.addEventListener('mousedown', e => {
      if (dropScreen.style.display !== 'none') return;
      if (e.button === 0) orbit.dragging = true;
      if (e.button === 2) orbit.panning  = true;
      orbit.lastX = e.clientX;
      orbit.lastY = e.clientY;
    });
    window.addEventListener('mousemove', e => {
      const dx = e.clientX - orbit.lastX;
      const dy = e.clientY - orbit.lastY;
      orbit.lastX = e.clientX;
      orbit.lastY = e.clientY;
      if (orbit.dragging) {
        orbit.theta -= dx * 0.4;
        orbit.phi    = Math.max(5, Math.min(175, orbit.phi + dy * 0.4));
        updateCamera();
      }
      if (orbit.panning) {
        const speed = orbit.radius * 0.001;
        orbit.panX -= dx * speed;
        orbit.panY += dy * speed;
        updateCamera();
      }
    });
    window.addEventListener('mouseup', () => { orbit.dragging = false; orbit.panning = false; });
    sceneEl.addEventListener('wheel', e => {
      if (dropScreen.style.display !== 'none') return;
      e.preventDefault();
      orbit.radius = Math.max(1, Math.min(20, orbit.radius + e.deltaY * 0.01));
      updateCamera();
    }, { passive: false });
    sceneEl.addEventListener('contextmenu', e => e.preventDefault());

    let lastTouchDist = 0;
    sceneEl.addEventListener('touchstart', e => {
      if (e.touches.length === 1) { orbit.dragging = true; orbit.lastX = e.touches[0].clientX; orbit.lastY = e.touches[0].clientY; }
      if (e.touches.length === 2) { orbit.dragging = false; lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }
    });
    sceneEl.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 1 && orbit.dragging) {
        const dx = e.touches[0].clientX - orbit.lastX; const dy = e.touches[0].clientY - orbit.lastY;
        orbit.lastX = e.touches[0].clientX; orbit.lastY = e.touches[0].clientY;
        orbit.theta -= dx * 0.4; orbit.phi = Math.max(5, Math.min(175, orbit.phi + dy * 0.4)); updateCamera();
      }
      if (e.touches.length === 2) {
        const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        orbit.radius = Math.max(1, Math.min(20, orbit.radius - (d - lastTouchDist) * 0.02)); lastTouchDist = d; updateCamera();
      }
    }, { passive: false });
    sceneEl.addEventListener('touchend', () => { orbit.dragging = false; });

    btnPick.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

    function clearModel() {
      if (modelEl && modelEl.parentNode) modelEl.parentNode.removeChild(modelEl);
      modelEl = null;
      if (blobURL) { URL.revokeObjectURL(blobURL); blobURL = null; }
    }

    function loadFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['glb','gltf','obj'].includes(ext)) { alert('Formato nao suportado. Use .glb, .gltf ou .obj'); return; }
      clearModel();
      blobURL = URL.createObjectURL(file);
      modelEl = document.createElement('a-entity');
      if (ext === 'obj') { modelEl.setAttribute('obj-model', 'obj: ' + blobURL); }
      else               { modelEl.setAttribute('gltf-model', blobURL); }
      wrapper.appendChild(modelEl);
      modelEl.addEventListener('model-loaded', () => {
        const obj = modelEl.getObject3D('mesh');
        if (!obj) return;
        obj.updateMatrixWorld(true);
        const box = new THREE.Box3().setFromObject(obj);
        const size = new THREE.Vector3(); const center = new THREE.Vector3();
        box.getSize(size); box.getCenter(center);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = maxDim > 0 ? (3 / maxDim) : 1;
        modelEl.object3D.scale.set(scale, scale, scale);
        modelEl.object3D.position.set(-center.x * scale, -center.y * scale, 0);
        orbit.radius = 5; orbit.theta = 0; orbit.phi = 75; orbit.panX = 0; orbit.panY = 0;
        updateCamera();
        hudName.textContent = file.name;
        dropScreen.style.display = 'none';
        hud.style.display = 'flex';
      });
      modelEl.addEventListener('model-error', () => { alert('Erro ao carregar o modelo.'); clearModel(); });
    }

    btnRemove.addEventListener('click', () => {
      clearModel(); fileInput.value = '';
      hud.style.display = 'none'; dropScreen.style.display = 'flex';
    });

    sceneEl.addEventListener('loaded', updateCamera);
  </script>
</body>
</html>
